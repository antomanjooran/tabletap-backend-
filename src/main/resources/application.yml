# src/main/resources/application.yml
spring:
  application:
    name: tabletap-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tabletap}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema; Hibernate just validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  error:
    include-message: always

# JWT
jwt:
  secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-production}
  expiration-ms: 86400000          # 24 hours

# Stripe
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_...}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_...}
  currency: gbp

# App config
app:
  service-charge-rate: 0.125       # 12.5%
  cors-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
